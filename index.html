<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <title>Portal Layanan Quorum-State</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none; }
        .result { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-left: 4px solid #00d4ff; }
        .path { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <h2>Bungker Layanan: Firewall of Jakarta Aktif</h2>
    <input type="text" id="searchInput" placeholder="Cari layanan, dokumentasi, atau MayaWare module...">
    <div id="results"></div>

    <script>
        let searchData = [];
        // Mengambil data dari hasil indexer.py
        fetch('../search_index.json')
            .then(response => response.json())
            .then(data => { searchData = data; });

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            resultsDiv.innerHTML = '';
            
            if (term.length < 2) return;

            const filtered = searchData.filter(item => 
                item.title.toLowerCase().includes(term) || 
                item.snippet.toLowerCase().includes(term)
            );

            filtered.forEach(item => {
                resultsDiv.innerHTML += `
                    <div class="result">
                        <strong>${item.title}</strong><br>
                        <small>${item.snippet}...</small><br>
                        <span class="path">${item.path}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>

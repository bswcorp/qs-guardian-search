<!-- TOMBOL DARURAT (KILL-SWITCH) -->
<div style="margin-top: 15px; border-top: 1px solid var(--red); padding-top: 10px;">
    <button id="killSwitch" style="width: 100%; background: #220000; color: var(--red); border: 2px solid var(--red); padding: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 2px; font-weight: bold;">
        ☢️ EMERGENCY KILL-SWITCH
    </button>
</div>

<script>
    document.getElementById('killSwitch').onclick = function() {
        let confirmAction = confirm("PERINGATAN: Protokol Bumi Hangus! Amankan seluruh Data Center dan Putuskan Koneksi Global?");
        if (confirmAction) {
            // Suara Alarm (Opsional)
            alert("PROTOKOL AKTIF: Data Quorum-State Terenkripsi. Jalur Keluar Ditutup. Status: MERDEKA ATAU MATI.");
            
            // Visual Efek: Semua layar jadi Merah
            document.body.style.background = "#330000";
            document.getElementById('status').innerText = "SYSTEM LOCKED - DATA SECURED";
            document.getElementById('status').style.color = "white";
            
            // Mengirim sinyal ke backend (simulasi)
            console.log("SENTINEL: Kill-Switch Initiated by Andi M. Harpianto.");
        }
    };
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-State | AJ Engine</title>
    <style>
        :root {
            --gold: #D4AF37;
            --neon: #00f2ff;
            --bg: #050505;
        }
        body { 
            background: var(--bg); color: white; 
            font-family: 'Courier New', monospace; 
            margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
        }
        
        /* Aksara Nusantara sebagai Magnet Background */
        .background-aksara {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            font-size: 5rem; opacity: 0.05; white-space: nowrap;
            z-index: -1; color: var(--gold);
        }

        .container { text-align: center; width: 100%; max-width: 600px; padding: 20px; }

        .search-box input {
            width: 100%; padding: 15px; background: #000;
            border: 2px solid var(--gold); color: var(--neon);
            font-size: 1.5rem; text-align: center; border-radius: 30px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            outline: none; transition: 0.3s;
        }
        .search-box input:focus { box-shadow: 0 0 30px var(--neon); border-color: var(--neon); }

        /* INTEGRASI TOMBOL TITAN HUB */
        .titan-hub {
            margin-top: 40px; display: flex; gap: 15px; justify-content: center;
        }
        .btn-hub {
            padding: 10px 20px; border: 1px solid var(--gold); 
            background: transparent; color: var(--gold);
            text-decoration: none; font-size: 0.8rem; font-weight: bold;
            border-radius: 5px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-hub:hover { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        #status { margin-top: 15px; font-size: 0.8rem; color: #4ade80; letter-spacing: 2px; }

        .f6s-badge { position: fixed; bottom: 20px; right: 20px; }
    </style>
</head>
<body>
    
    <div class="background-aksara">
        ꦱꦪꦕꦶꦤ꧀ꦠꦱꦾꦫꦥ꦳꧀ꦏꦸꦱꦼꦤ꧀ꦢꦶꦫꦶ
    </div>

    <div class="container">
        <h2 style="color: var(--gold); letter-spacing: 5px;">AJ ENGINE</h2>
        <div class="search-box">
            <input type="text" id="aj-input" placeholder="[ INPUT SARAF ]" autofocus autocomplete="off">
        </div>
        <p id="status">● Saraf Terhubung ke Q-Net</p>

        <!-- TOMBOL INTEGRASI OTOMATIS -->
        <div class="titan-hub">
            <a href="https://www.qstate.abrdns.com" class="btn-hub">🏛️ BANK PORTAL</a>
            <a href="https://quorumstate.international" class="btn-hub">🌐 GLOBAL SITE</a>
            <a href="https://www.qstate.abrdns.com" class="btn-hub">🛡️ TITAN GENESIS</a>
        </div>
    </div>

    <div class="f6s-badge">
        <a href="https://www.f6s.com/member/sovereign-titan-genesis?follow=1" target="_blank">
            <img src="https://www.f6s.com/images/f6s-follow-primary.png" width="78" height="22" alt="Follow F6S" />
        </a>
    </div>

    <script>
        // Logika Sederhana untuk Input
        document.getElementById('aj-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                alert('Mencari di Jaringan Q-Net: ' + this.value);
                // Di sini nanti kita sambungkan ke fungsi pencarian database Bapak
            }
        });
    </script>
</body>
</html>
